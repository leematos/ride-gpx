# GPX Rider tuning — every adjustable app parameter in one documented place,
# shared by the browser app AND the Python generators (no more mirroring
# values by hand in scripts/).
#
# Change a value here, reload the page, done: there is no build step. Each
# key says what it does, what unit it is in, and what happens when you move
# it. Settings the user can change in the ⚙ dialog only get their *defaults*
# from here — a value already saved in the browser (see app/storage/
# storage.mjs) wins until the user resets it (or clears site data).
#
# Layout: values are grouped into snake_case sections, at most two levels
# deep (section → group → key). app/core/tuning.mjs maps each nested path
# back to the historical UPPER_SNAKE constant name the rest of the app still
# imports, and scripts/tuning_config.py walks the same tree — so the two
# languages read the exact same file. Move or rename a key here and you only
# touch those two mappers, not every call site.
#
# Read by app/core/tuning.mjs (browser + tests) and scripts/tuning_config.py
# (generators). Both implement the same deliberately small YAML subset:
#   - "#" comments (full-line or after whitespace)
#   - block maps nested by 2-space indentation
#   - block sequences ("- item"), items may be scalars, flow collections, or
#     small maps
#   - flow sequences [a, b] and flow maps { k: v }
#   - scalars: quoted/bare strings, numbers, true/false/null, .inf
# Keep colors and anything containing ":" or "#" in double quotes. Anchors,
# multi-line block scalars and other full-YAML features are NOT supported.
#
# Two things deliberately do NOT live here:
#   - app/config.mjs — the deploy-time Maps API key slot. It is rewritten by
#     scripts/inject_maps_api_key.py during deployment, so it must stay as-is.
#   - BLE write-queue internals in trainer/trainer.mjs — timing of GATT
#     operations is a hardware-safety concern, tuned against real trainers;
#     read the comments there before touching them.

app:
  # The product name shown in the UI and written into exported files.
  name: "GPX Rider"

# --- Movement & pedaling -----------------------------------------------------
movement:
  # Pedaling detection with hysteresis: the rider counts as "pedaling" once the
  # trainer reports at least start_kph, and stops counting only after speed
  # falls to stop_kph. The gap keeps a spinning-down flywheel from flapping
  # the movement source on/off around a single threshold.
  pedaling:
    start_kph: 3
    stop_kph: 1

  # Simulation speed slider: the artificial speed used to auto-ride a route
  # with no trainer. default_kph is where the slider starts; min/max bound both
  # the slider and any saved value. These drive the range input's attributes
  # at startup, so this is the single source of truth for the slider's range.
  simulation_speed:
    min_kph: 8
    max_kph: 100
    default_kph: 24

  # A backgrounded tab stops requestAnimationFrame; without this cap the first
  # frame after returning would teleport the rider minutes down the road.
  # Raising it makes background riding smoother-looking on return but risks a
  # visible jump after long pauses.
  max_tick_seconds: 5

  # How often the slow parts of the ride UI (DOM stats, elevation profile,
  # minimap marker) refresh while moving. The map camera still updates every
  # frame; this only throttles text/canvas work.
  slow_ui_interval_ms: 250

  # How often the ride (route + progress) is persisted to browser storage
  # while moving. Lower = less progress lost on a crash, more storage churn.
  ride_save_throttle_ms: 1500

# --- Trainer grade updates ---------------------------------------------------
trainer:
  # How often the averaged route grade is written to the trainer, in seconds.
  # default_seconds is what the settings slider starts at; min/max bound both
  # the slider and any saved value. Faster updates track terrain more closely
  # but make the trainer hunt on noisy GPX elevation.
  grade_interval:
    default_seconds: 2
    min_seconds: 1
    max_seconds: 5
  # Rolling-resistance coefficient sent with every Track Resistance (grade)
  # command to a Tacx FE-C trainer (the wheel-on Flow/Vortex/Bushido/Genius,
  # which speak ANT+ FE-C over BLE instead of FTMS). 0.004 is a typical
  # asphalt value; raise it for a heavier simulated surface. Ignored by FTMS
  # trainers, whose Set Simulation Parameters carries its own rolling term.
  fec_default_crr: 0.004

# --- Route math (grade, ascent/descent) --------------------------------------
route_math:
  # The live grade is measured over a window this many meters behind and ahead
  # of the rider. Longer = smoother grade that lags hill starts; shorter =
  # snappier but noisier with imperfect GPX elevation.
  grade_lookaround_meters: 18

  grade:
    # The grade sent to the trainer and shown in the stats is clamped to this
    # range (in percent) so one bad elevation point can't slam the trainer.
    min_percent: -15
    max_percent: 20
    # The HUD grade meter caps its visual scale more tightly than the clamp
    # above. Values beyond these endpoints pin to the edge, keeping the outer
    # green/red bands comparable in width to the middle bands.
    meter_min_percent: -6
    meter_max_percent: 10

  # Total ascent/descent noise filter: an elevation change only counts toward
  # the cumulative ascent/descent once it exceeds this many meters in one
  # direction. GPX elevation jitters by a meter or so point-to-point; summing
  # it raw would badly overestimate climbing. Bigger values under-count short
  # rollers, smaller values over-count noise. 2 m matches what most route
  # planners report. (Also used by the gallery generator so cards report the
  # same totals the app shows once the route is loaded.)
  climb_noise_threshold_meters: 2

# --- Grade color palette -----------------------------------------------------
#
# Stepped grade palette shared by the elevation profile, the map route
# coloring, the HUD meters, the climb banner mini-profile, AND the gallery
# generator's mini profile bars (scripts/generate_gallery_json.py) — one
# palette, read from here by both languages. The panel legend swatches in
# styles.css are the one remaining hand-synced copy (CSS cannot read this
# file). Buckets read: green for descents, gray for flat, amber -> orange ->
# red as the climb steepens.
grade_palette:
  # Bucket boundary grades, in percent: descent | easy descent | flat | gentle
  # | moderate | steep. A grade at or below the first threshold gets the first
  # color, and so on; anything past the last threshold gets the last color.
  thresholds: [-3, -0.6, 0.8, 3.5, 7]

  # One color per bucket (thresholds above define the 5 boundaries between
  # these 6 colors).
  colors:
    - "#3fae6a"
    - "#57b877"
    - "rgba(125, 138, 134, 0.55)"
    - "#e8b74e"
    - "#e8823c"
    - "#d9542f"

# --- Smart ETA ---------------------------------------------------------------
#
# The ETA converts the route into "flat-equivalent meters": every meter of
# climbing still ahead counts as extra flat distance, every meter of descent
# gives a little back. Your pace in flat-equivalent meters per second is
# measured over the ride so far, then applied to what's left — so a slow
# pass over the top of a climb doesn't project a slow descent.
eta:
  # How many flat meters one vertical meter of climbing costs. ~25 matches a
  # recreational rider around 150 W (1 km at 8% ≈ 1 km + 80 m × 25 = 3 km
  # flat-equivalent). Strong riders effectively "pay" less — lower it if the
  # ETA overshoots on climbs for you.
  climb_equivalent_factor: 25

  # How many flat meters one vertical meter of descent gives back. Descending
  # is faster than flat riding but not free (braking, corners). Must stay well
  # below 1/max-descent-grade (~6.7 at the -15% clamp) or a steep descent
  # could count as negative distance.
  descent_credit_factor: 5

  # The measured pace is trusted only after this much riding; before that the
  # ETA falls back to the current speed (rough, but better than nothing).
  min_history_seconds: 45
  min_history_meters: 150

# --- Camera defaults & bounds ------------------------------------------------
camera:
  # Follow-camera defaults (the settings sliders start here; "Reset camera"
  # returns here). zoom is a multiplier on the base viewing distance,
  # angle_degrees is the tilt from straight-down, behind_meters is how many
  # meters the camera trails the rider.
  follow_defaults:
    zoom: 2.5
    angle_degrees: 75
    behind_meters: 800

  # First-person camera preset. default_height_meters approximates a seated
  # rider's eye line; min/max bound the configurable eye height. The camera eye
  # is placed at the rider and looks look_ahead_meters ahead on the route.
  # tilt_degrees keeps the ordinary Camera angle slider near the horizon while
  # the preset is selected.
  first_person:
    default_height_meters: 1.7
    min_height_meters: 0.8
    max_height_meters: 2.2
    look_ahead_meters: 20
    tilt_degrees: 88

  # Deliberately huge bounds: they exist only to keep corrupted saved settings
  # from wedging the camera, not to restrict framing — wide shots for
  # screenshots need extreme zoom-outs and pans.
  bounds:
    zoom_min: 0.001
    zoom_max: 1000
    pan_limit_meters: 100000
    center_altitude_limit_meters: 20000
    tilt_min: 1
    tilt_max: 89

  # The rider's heading is sampled this many meters behind/ahead of the rider,
  # so the camera points the way the rider moves rather than at a distant spot.
  heading_sample_meters: 4

  # After the user stops touching the map, the app waits this long before
  # capturing the manual camera and resuming automatic control.
  interaction_settle_ms: 600

  # Map3DElement's documented default field of view, in degrees. Used to reset
  # camera modes that do not deliberately tune FOV.
  default_map_fov_degrees: 35

# --- Route overview framing --------------------------------------------------
#
# Route overview shown when a route loads: whole route framed from this tilt.
overview:
  # Degrees from straight-down — 0 is top-down, ~89 is nearly at the horizon (a
  # low, terrain-revealing angle). NOTE: Google's 3D map limits how far it will
  # tilt toward the horizon when the camera is far out, so at the large range
  # needed to frame a long route a high tilt may be pulled back toward
  # top-down. Use the range knobs below to bring the camera closer if a steeper
  # tilt isn't taking effect (watch the Debug camera overlay).
  tilt_degrees: 70

  # Which side the overview looks from, as a rotation (degrees) on top of the
  # side the algorithm auto-picks (which puts the route's bulk away from the
  # viewer, start-left/end-right). 0 = the auto choice; 180 = the exact opposite
  # side, still with the route's long axis horizontal — this is how you flip a
  # route to see it "from the other side". Other values swing the view to any
  # azimuth (the route then reads diagonally, but it's still fully framed).
  heading_offset_degrees: 0

  # Slack around the route when fitting it to the viewport. 1.0 hugs the route
  # to the screen edges; higher leaves more empty margin (camera further out).
  margin_factor: 0.9

  # Multiplier on the fitted overview range. 1 frames the whole route; below 1
  # pulls the camera in closer (route edges crop off, but terrain relief reads
  # much better at a low tilt); above 1 pushes it further out. This is the main
  # knob for trading "see the whole route" against "see the 3D terrain".
  range_factor: 0.75

  # Hard bounds (meters) on the overview range, applied after the factor. The
  # max cap is the other way to force a closer, more terrain-rich view on long
  # routes (at the cost of not framing the whole thing); leave it at .inf to
  # always frame the entire route. Min keeps tiny routes from zooming in absurdly.
  min_range_meters: 250
  max_range_meters: .inf

# --- Overview motion (static / orbit / ellipse flyby) ------------------------
overview_motion:
  # How the whole-route overview behaves when a route loads. This is a user
  # setting (Settings › Camera & view); the value here is only the default.
  #   "static"           — the framed still shot (the classic overview)
  #   "orbit"            — turntable: the static shot slowly rotates around the route
  #   "flyby"            — a camera flies a PCA-aligned ellipse around the route
  #   "flyover"          — a camera flies a figure-eight over the route (shares ellipse_flyby)
  #   "satellite"        — straight-down, north-up view with the route framed as big as fits
  default_mode: "orbit"

  # Camera behavior after selecting a detected climb: "static" holds the
  # fitted climb view; "orbit" circles it; "satellite" shows it north-up.
  default_climb_focus_mode: "orbit"

  # When an animated overview (orbit/flyby) starts from a different camera
  # pose, ease into the motion over this many seconds instead of jumping.
  anim_intro_seconds: 1.5

  # Whole-route orbit: seconds for one full revolution, and spin direction
  # (1 = clockwise seen from above, -1 = counter-clockwise). Longer = statelier.
  orbit:
    seconds_per_rev: 75
    direction: 1

  # Selected climbs are much smaller than whole routes, so their orbit gets its
  # own faster, user-adjustable revolution time.
  climb_orbit:
    default_seconds_per_rev: 30
    min_seconds_per_rev: 10
    max_seconds_per_rev: 90

  # Satellite overview: a straight-down (near-vertical), north-up still framing
  # the whole route as large as it fits. tilt_degrees is how far from vertical
  # the camera leans — 1 is the closest to true top-down Map3D allows (0 breaks
  # the framing math). margin_factor is the fit margin: 1 fills the viewport
  # edge-to-edge, higher leaves more breathing room.
  satellite:
    tilt_degrees: 1
    margin_factor: 1.12

  # Ellipse flyby (also drives the figure-eight "flyover" — same settings, only
  # the path shape differs): a camera flies along an ellipse aligned to the
  # route's principal axis and looks along its direction of travel. ellipse_scale
  # below 1 lets the flight path cut inside the route footprint; higher altitude,
  # view_distance, and a flatter mount_pitch keep more of the route in view.
  # seconds_per_lap controls the target time for one complete ellipse circuit,
  # like orbit's revolution duration. max_speed_mps caps the resulting speed; if
  # the cap is hit, the actual lap takes longer than seconds_per_lap.
  # fly_height_meters_min is the baseline height above the route's center
  # altitude; fly_height_meters_above_terrain_min keeps the camera at least that
  # far above the highest terrain along the flight path. The actual fly height
  # uses whichever minimum requires the higher camera. The "highest terrain" is
  # sampled along the whole flight path from online elevation tiles when they
  # are enabled (so a hill the route detours around is still cleared); with
  # tiles off it falls back to the highest *route* point under the ellipse,
  # which can miss off-route hills. sample_count also sets how many points the
  # flight path is sampled at for this terrain profile.
  # camera_fov_degrees is passed to Map3D's `fov` property while the fly-by runs;
  # 5 is telephoto, 80 is wide-angle, 35 matches the normal Map3D default.
  # inward_look_degrees rotates the fly-by camera horizontally toward the inside
  # of the ellipse: clockwise flights look right, counter-clockwise flights left.
  # The fly-over (figure-eight) reuses this value but, since it changes turn
  # direction each lobe, looks into whichever turn it is currently in and eases
  # back to straight-ahead through the center crossings — so the same degrees
  # read as "slightly left, then straight, then slightly right" over one lap.
  # direction is 1 for clockwise seen from above, -1 for counter-clockwise.
  # min_turn_radius_meters is a radius: 2500 m means the tightest possible circle
  # would be 5 km across. max_bank_degrees is the roll applied at that tightest
  # turn; broader turns roll proportionally less.
  ellipse_flyby:
    ellipse_scale: 0.78
    min_semi_major_meters: 1200
    min_semi_minor_meters: 700
    min_turn_radius_meters: 750
    direction: 1
    seconds_per_lap: 40
    max_speed_mps: 10000
    fly_height_meters_min: 1400
    fly_height_meters_above_terrain_min: 300
    camera_fov_degrees: 60
    inward_look_degrees: 20
    mount_pitch_degrees: 15
    view_distance_meters: 3200
    max_bank_degrees: 60
    sample_count: 360
    start_angle_degrees: 0

# --- Camera transition arcs (overview ↔ chase handoffs) -----------------------
#
# The flight the camera takes when it hands over between the route overview
# and the rider chase camera (both directions): a physically-constrained
# "missile POV" arc (app/camera/transition-arc.mjs) that matches the position
# AND velocity of both endpoint cameras, looks along its own flight path
# mid-flight, and banks into its turns. When no candidate duration can satisfy
# the physical limits (or enabled is false) the handoff falls back to the
# ordinary chase flight, exactly as before this feature existed.
camera_transition:
  enabled: true

  # Which camera targets are flown into with the physical transition arc, vs.
  # snapped/eased by their own driver. The arc only makes sense when the target
  # is a continuously-moving camera you can dock onto with matching velocity:
  #   "follow"  — the rider camera (the rider is a real moving object)
  #   "flyby"   — the ellipse fly-by pattern (a natural continuous flight)
  #   "flyover" — the figure-eight fly-over pattern (likewise)
  # Deliberately NOT arced into: "static"/"orbit"/"satellite" overviews (incl.
  # the climb-focus and finish-line variants) — they are artificial framings, so
  # arcing into them like a real object reads as two stitched motions. A camera
  # reset also stays off the arc (it is a small "put it back", not a transition).
  # Remove a mode here to fall its transitions back to the plain chase/eased entry.
  arc_into_modes: ["follow", "flyby", "flyover"]

  # Where an arc into a fly-by / fly-over pattern docks. A joinable entry must
  # be no steeper than this many degrees up from the horizon (the plain
  # nearest pattern point is usually almost straight overhead, which forced a
  # contorted joining arc) and must not oppose the pattern's travel direction
  # (the pattern is a directed flight — docking where it heads back at the
  # camera would whip the view around). Among joinable entries, the one
  # needing the least head-turn from the current line of sight wins: a
  # crossing dead ahead when the camera faces the pattern, else the first
  # qualifying point that comes into view turning toward it. Steeper = allows
  # entries closer to overhead; shallower = pushes entries further out.
  fly_entry_climb_degrees: 45

  # Candidate flight durations, in seconds: the solver scans from min upward
  # in solver_step increments and flies the shortest duration whose curve
  # passes every physical limit below. min is therefore the typical transition
  # time; max only matters for awkward geometry (fast/opposed entry
  # velocities), which sweeps wider, longer arcs before giving up.
  min_duration_seconds: 7
  max_duration_seconds: 12
  solver_step_seconds: 0.5

  # Scale-aware minimum turn radius: max(floor, fraction × straight-line
  # distance). Short hops are "flown slower", so they may turn tighter — the
  # limit is enforced as a lateral-acceleration cap of (distance/duration)² /
  # radius, i.e. the full radius applies at cruise speed and shrinks with v²
  # below it, the way a real turning aircraft's does. Raise the fraction for
  # statelier, wider arcs; lower it to allow snappier turns.
  min_turn_radius_floor_meters: 30
  min_turn_radius_distance_fraction: 0.08

  # Steepest climb/dive angle (degrees from horizontal) the flight tangent may
  # reach. An overview sits high above the chase camera, so its dive is
  # legitimately steep; below ~60 many overview→chase handoffs become
  # unsolvable and fall back to the chase flight.
  max_climb_angle_degrees: 75

  # Loop-prevention guardrail from the Hermite fit: the velocity control
  # offsets (velocity × duration/3) may not exceed this fraction of the
  # straight-line distance, or the curve could fold back over itself. A
  # candidate duration needing more is rejected (clamping would silently break
  # the exact docking velocities).
  velocity_clamp_distance_fraction: 0.5

  # How much of the flight (fraction of normalized time, from each end) is
  # used to sweep the view between the endpoint camera's real look direction
  # and the mid-flight "look along the flight path" POV. Wider = gentler view
  # rotation, narrower = more of the flight spent in pure missile POV.
  lookat_blend_in_fraction: 0.25
  lookat_blend_out_fraction: 0.35

  # Roll applied when the arc turns hard: full bank exactly at the lateral-
  # acceleration limit, proportionally less in gentler turns (same convention
  # as the fly-by/fly-over modes: positive banks into a right turn).
  max_bank_degrees: 25

  # Samples along each candidate curve when checking the physical limits.
  sample_count: 240

  # Transitions shorter than this (meters between the two camera eyes) are not
  # worth a flight — the ordinary chase flight handles them better.
  min_distance_meters: 40

# --- Finish-line orbit -------------------------------------------------------
#
# The instant a ride (pedaled, simulated, or demo) reaches the end of the
# route, the camera leaves the rider and orbits the finish point instead of
# freezing on the follow camera's last frame. It reuses the same animated
# orbit driver as the modes above (same intro ease-in, same manual-drag/toggle
# exit) but is centered directly on the finish point rather than a route-shape
# fit, since "the route" at the finish line is a single point with nothing to
# frame.
finish_orbit:
  enabled: true
  range_meters: 1200
  tilt_degrees: 75
  seconds_per_rev: 60
  direction: 1
  # Height (meters) above the finish point's ground elevation the camera looks
  # at, so the orbit centers roughly on rider-eye height instead of bare ground.
  lookat_height_meters: 10

# --- Overview debug travel line ----------------------------------------------
#
# Red overview travel line drawn while the camera debug overlay is enabled.
# Orbit draws the orbit eye ground track; Fly-by draws its fitted ellipse.
overview_debug_line:
  color: "#ff2d2d"
  width: 8
  altitude_meters: 8
  sample_count: 240

# --- Camera terrain avoidance ------------------------------------------------
#
# Lift the camera when its view ray would sink into a hillside, easing back
# down once the terrain allows. The terrain estimate comes from the route's
# own elevation points — deliberately NOT the Google Elevation API, which
# would cost real money at follow-camera query rates.
terrain_avoidance:
  enabled: true
  clearance_meters: 20

  # Switchback roads (e.g. the Amalfi Coast) fold back on themselves, so a
  # hairpin's higher hillside can sit a couple of hundred meters away in
  # straight-line terms while being far along the route path — a narrow radius
  # only ever sees the (lower) stretch of road right at the sample point and
  # misses that the ground behind it keeps climbing. Cast a wide net; slightly
  # overestimating nearby terrain just holds the camera a bit higher; missing
  # it puts the eye inside the hillside.
  sample_radius_meters: 400

  # How often the (relatively expensive) terrain scan reruns.
  lift_recompute_ms: 150

  # Rise fast enough to clear an approaching hill, settle back slowly so the
  # camera does not pump up and down on rolling terrain. Time constants in
  # seconds of exponential smoothing.
  lift_rise_tau_seconds: 0.3
  lift_fall_tau_seconds: 4

# --- Follow-camera rider visibility ------------------------------------------
#
# Follow mode only. Terrain lift (above) raises the camera over a hillside its
# view ray sinks into; this handles the *other* occlusion case — a hill sitting
# squarely between the eye and the rider even with the eye well above ground,
# where lifting further would only tip the view uselessly overhead. Instead the
# camera swings horizontally around the rider (the rider stays centered, only
# the viewing side changes), taking the least rotation left or right that clears
# the hill. It reuses terrain_avoidance's clearance and terrain sources (route
# elevation, plus online tiles when enabled), and eases in/out like the lift.
# NOT applied in any other camera mode (overview / orbit / fly / transition).
rider_visibility:
  enabled: true

  # Search up to this many degrees each way for a clear line of sight, in these
  # steps. Wider max lets the camera swing further around a big hill; a finer
  # step finds a tighter clearing swing at the cost of more terrain lookups.
  max_nudge_degrees: 72
  step_degrees: 8

  # Points sampled along the eye→rider sightline when testing for occlusion.
  ray_samples: 6

  # How often the (relatively expensive) occlusion search reruns. Between runs
  # the applied swing keeps easing toward the last computed target.
  recompute_ms: 150

  # Swing toward a clearing angle quickly, ease back to straight-behind slowly,
  # so the camera does not jitter sideways on broken terrain. Seconds.
  rise_tau_seconds: 0.35
  fall_tau_seconds: 2.5

# --- Online terrain elevation (Mapzen Terrarium tiles) -----------------------
#
# Real ground elevation streamed from the public Mapzen Terrarium terrain-RGB
# tiles on the AWS Open Data bucket — no API key, no cost, anonymous requests.
# It augments the route-based estimate above (the camera lift takes the higher
# of the two) so the follow camera clears hillsides the GPX track itself never
# climbs. When off, the app falls back to the route-only estimate and no tiles
# are ever fetched. Google's own 3D map already streams imagery for the same
# area, so this exposes no location the map didn't already request.
terrain_tiles:
  # Default for the "Use online terrain data" toggle in Rendering settings.
  enabled: true

  # Slippy-map base URL; "{z}/{x}/{y}.png" is appended. The AWS Open Data
  # bucket is public and serves the tiles with permissive CORS, so the browser
  # can read their pixels back off a canvas to decode elevation.
  base_url: "https://s3.amazonaws.com/elevation-tiles-prod/terrarium/"

  # Fetch zoom level. Higher = finer ground detail but more/larger tiles; 12 is
  # ~9.5 m per pixel at the equator (finer toward the poles), plenty for keeping
  # the camera above ridgelines, and one tile spans several km so a whole ride
  # usually stays inside one or two cached tiles.
  zoom: 12

  # Terrarium tiles are always 256×256 px.
  tile_size: 256

  # Max decoded tiles kept in memory (each is tile_size² floats ≈ 256 KB at
  # 256 px), LRU-evicted past this. The browser's own HTTP cache still avoids
  # re-downloading evicted tiles.
  max_cache_tiles: 64

  # Open-data attribution shown at the bottom of the setup panel while online
  # terrain is on (the compiled SRTM/USGS sources ask for a credit line).
  attribution: "Elevation data courtesy of Mapzen / AWS Open Data"

# --- Profile segment selection -----------------------------------------------
profile_segment_selection:
  # Horizontal pointer movement before a profile interaction becomes a segment
  # selection instead of a normal click-to-seek.
  drag_pixels: 8

  # The smallest elevation-profile drag interval accepted as a selected segment.
  # Very short routes scale this down by min_route_fraction.
  min_meters: 50
  min_route_fraction: 0.01

# --- Rider beacon (defaults for the Rendering settings) ----------------------
#
# A translucent extruded cylinder standing on the rider so the position stays
# visible when trees or buildings hide the ground dot. Off by default — it's
# visually heavy; opt in from the Rendering settings.
rider_beacon:
  enabled: false
  diameter_meters: 5
  height_meters: 20
  opacity: 0.35
  color: "#ffffff"

# --- Rider dot ---------------------------------------------------------------
#
# The ground marker showing the rider's position is a Model3DElement (see
# renderRiderDot in map/route-render.mjs), not a filled Polygon3DElement.
# Polygon3DElement is meant for static terrain-draped areas; re-tessellating
# one every frame as the rider moves produced two separate failures confirmed
# in a real browser (not just reasoned about): the fill rendering solid black
# at ordinary follow-camera distances — independent of polygon winding,
# altitude/z-fighting with terrain (tried 1m through 20m up), and
# `extruded: true` (a short cylinder instead of a flat disc), none of which
# changed it — and a faceted/streaky look from the constant re-triangulation.
# A real mesh sidesteps both.
rider_dot:
  # A path relative to app/, resolved by map/route-render.mjs against the app
  # root (not the page), so it loads correctly regardless of what path GPX Rider
  # is served from. Swap this to experiment with other models — a couple of
  # things to expect when trying a new one, both confirmed by testing, neither
  # documented anywhere we could find:
  #   - A model's local "up" axis does not necessarily map to world-up; if a
  #     new model stands on its edge instead of lying flat, adjust orientation
  #     below (the shipped puck needed tilt: 90).
  #   - An ordinary lit PBR material can render solid black on this renderer
  #     regardless of normals/winding/texturing — if a replacement model
  #     renders black, look for (or add) a KHR_materials_unlit extension on
  #     its materials, the same fix the shipped puck needed.
  model_path: "assets/rider-dot.glb"

  # heading/tilt/roll passed straight to Model3DElement's `orientation`. Not
  # meaningful in isolation — it corrects for the specific model at model_path's
  # own local axes, so re-tune this whenever that model changes (see the note
  # above).
  orientation:
    heading: 0
    tilt: 90
    roll: 0

  # The model at model_path is baked to a true 1 meter diameter, so this is a
  # plain real-world size multiplier, not a unitless fudge factor — unlike a
  # screen-space billboard (Marker3DElement + PinElement, tried and rejected:
  # doesn't grow/shrink with camera distance the way a real ground object
  # should, and a map-pin shape doesn't read as a location dot anyway). A
  # different model baked to a different base size will need this retuned.
  scale: 5

  # Extra size multiplier while the whole-route overview is active. The camera
  # is much farther away there, so the normal ride-scale dot can become hard to
  # spot.
  overview_scale_factor: 2.4

  # Only used by the Polyline3DElement fallback for browsers without
  # Model3DElement (see renderRiderDot) — an outlined ring instead of a filled
  # dot, since Polyline3DElement has no fill. Diameter in meters.
  diameter_meters: 5

  # How high the dot's origin sits above the terrain, in meters. Independent
  # of route_line.altitude_meters on purpose: the route line has to float well
  # clear of the terrain because a thin drawn line clamped to the ground
  # smears down slopes, but a real mesh (Model3DElement) doesn't have that
  # problem, so there's no reason to lift it off the ground the way the line
  # is. Not 0 though (confirmed by testing, not just assumed): the shipped
  # puck's origin is at its vertical center (0.15m tall, see
  # scripts/generate_rider_dot_model.py), so at 0 its bottom half was buried
  # in the terrain — and the model needed clearing by more than just its own
  # half-height (0.075m) to fully stop clipping on steep terrain, most likely
  # because the terrain mesh itself isn't perfectly smooth/precise at close
  # range. 0.5 was the smallest value that cleared cleanly on a steep
  # switchback in testing. Retune per model at model_path — start from that
  # model's own half-height above 0 and increase from there if it still clips,
  # especially on steep terrain.
  altitude_meters: 0.5

# --- Route line rendering ----------------------------------------------------
route_line:
  # Color the map route by the same grade buckets as the elevation profile.
  # Turning this off restores the single blue route trace.
  grade_colors_enabled: true

  # The route line floats this high above the terrain instead of being draped
  # onto it (draped strokes smear down steep slopes into wide blobs).
  altitude_meters: 2.5
  color: "#0a84ff"
  width: 14
  outer_color: "rgba(255, 255, 255, 0.72)"
  outer_width: 0.35

  # Selected climbs replace their normal route segments with this wider,
  # brighter-cased treatment. No second stacked line is used, avoiding z-fight.
  focus_line_width: 19
  focus_outer_color: "rgba(255, 255, 255, 0.96)"
  focus_outer_width: 0.8

  # The path is densified so elevated segments follow the ground between GPX
  # points; spacing grows on very long routes to cap the vertex count the map
  # engine has to handle.
  spacing_meters: 15
  max_points: 5000

# --- Gallery previews & mini profiles ----------------------------------------
gallery:
  preview:
    # Gallery cards start with lightweight classic satellite maps. fit_padding
    # keeps each route clear of the thumbnail edges after fitting its bounds.
    map_type: "satellite"
    fit_padding_pixels: 20
    # Route styling shared by the gallery's classic and opt-in 3D previews.
    route_color: "#0a84ff"
    route_width_2d: 5
    route_width_3d: 14
    route_outer_color_3d: "rgba(255, 255, 255, 0.72)"
    route_outer_width_3d: 0.35

  # Gallery card mini elevation profile (baked into app/gallery.json by
  # scripts/generate_gallery_json.py — rerun `make gallery-data` after changing
  # these): how many bars each card's strip has, and the lighter flat-bucket
  # tone used on cards (the standard palette's flat gray reads too dark on the
  # card background; all other buckets use grade_palette.colors).
  mini_profile:
    bar_count: 44
    flat_color: "rgba(200, 206, 214, 0.55)"

# --- Screenshots -------------------------------------------------------------
screenshots:
  # Ride screenshots come out at a constant size so gallery shots line up.
  # The button is opt-in — most riders never need it on the map.
  show_button: false
  aspect: "16:9"
  default_width: 1920
  width_min: 640
  width_max: 3840

# --- Recording (theater mode) ------------------------------------------------
recording:
  # One-click recording preset: a CSS-pinned "theater mode" that fixes the map
  # viewport to exactly this size (dimming the rest of the app behind it) so
  # screen captures come out at a consistent size. Not exported JPG dimensions,
  # and not an actual browser-window resize — most browsers block scripted
  # resizing of a window/tab they didn't open themselves via window.open().
  # The UI labels/messages naming this size are derived from these values.
  map_viewport:
    width_pixels: 1200
    height_pixels: 630
    tolerance_pixels: 1

  # Optional checkboxes (Demo mode panel) that hide specific HUD overlays while
  # theater mode is active, so a screen recording can be a clean, showcase-ready
  # shot of just the map, route and rider — no data tiles, banners or buttons.
  theater_hide:
    clock: false
    meters: false
    dock: false
    climb_banner: false
    demo_chip: false
    controls: false
    minimap: false

# --- Display & HUD defaults --------------------------------------------------
display_hud:
  # Satellite minimap overlay above the fullscreen data dock.
  show_minimap: false

  # Place labels (roads, towns, POIs) on the main 3D map. Off = clean
  # satellite imagery, on = Google's hybrid mode with labels.
  map_labels_enabled: false

  # Local clock format used by the fullscreen top-left stats chip. The user's
  # choice is persisted with the other display settings.
  time_format: "24"

  # Duration readouts default to explicit hour/minute labels (1h30m) so ETAs
  # cannot be mistaken for minute/second clocks. "clock" keeps the old 1:30:00
  # style for users who prefer stopwatch formatting.
  duration_format: "compact"

  # Wall-clock refresh cadence while the fullscreen HUD is visible.
  fullscreen_clock_refresh_ms: 1000

  # Heart-rate UI refresh cadence while a dedicated strap is connected. Strap
  # notifications remain the data source; this loop republishes the current
  # strap truth to every display even while the ride/map UI is otherwise idle.
  heart_rate_refresh_ms: 1000

  # Developer overlay: a small translucent box on the map showing the live
  # camera values the 3D map actually applies (tilt/range/heading/center),
  # plus ride progress. Off by default — it's a diagnostics aid, e.g. for
  # reading what tilt Google honours after a manual drag versus what we ask
  # for. The overlay refreshes on refresh_ms while it's visible.
  camera_debug:
    enabled: false
    refresh_ms: 100

  # Keep the gallery metadata camera readout live during animated overviews
  # without rebuilding its formatted JSON on every animation frame.
  gallery_metadata_camera_refresh_ms: 100

  # Ordered fullscreen bottom-dock data fields. Keys must match the
  # data-hud="…" attributes in app.html. visible_count controls how many
  # fields are shown from the front of the order; users can still put every
  # field on-screen if they want a denser dock.
  field_order:
    - speed
    - ascentLeft
    - calories
    - remaining
    - power
    - heartRate
    - grade
    - ridden
    - eta
    - altitude
    - ascent
    - elapsed
  visible_count: 4

  # The fullscreen ride HUD's bottom data dock can be collapsed to a compact
  # strip (key metrics + the two progress bars) or expanded to the full dock
  # (metric tiles + the road-ahead elevation profile). This is its initial
  # state; the user's choice is persisted with the other display settings.
  dock_collapsed: false

# --- Training zones & calories -----------------------------------------------
training_zones:
  # Training zones for the fullscreen left-side meters. Heart rate uses
  # Heart Rate Reserve (Karvonen) from resting/max HR; power uses FTP.
  resting_heart_rate_bpm: 60
  max_heart_rate_bpm: 180
  power_zone_definitions:
    - { name: "Active Recovery", color: "#8b949e" }
    - { name: "Endurance", color: "#4f9bff" }
    - { name: "Tempo", color: "#57b877" }
    - { name: "Threshold", color: "#e8b74e" }
    - { name: "VO2 Max", color: "#e8823c" }
    - { name: "Anaerobic", color: "#d96a3f" }
    - { name: "Neuromuscular", color: "#d9542f" }
  heart_rate_zone_definitions:
    - { name: "Recovery", color: "#8b949e" }
    - { name: "Endurance", color: "#4f9bff" }
    - { name: "Tempo", color: "#57b877" }
    - { name: "Threshold", color: "#e8823c" }
    - { name: "Max", color: "#d9542f" }
  heart_rate_max_age_formula_base: 220
  profile_history_sample_limit: 1800

  # Gross metabolic efficiency for converting measured cycling work into active
  # human calories. Power meters report mechanical work at the pedals; humans
  # spend more chemical energy than that to produce it. 0.24 means 24% of the
  # rider's active energy becomes measured mechanical work.
  cycling_gross_efficiency: 0.24

# --- Fullscreen climb banner -------------------------------------------------
climb_banner:
  # Top-center of the ride HUD. It appears while the rider is on a detected
  # climb, or while approaching the next one within this distance; it is hidden
  # otherwise.
  approach_meters: 1000

  # Bars drawn in the climb banner's mini elevation profile of the upcoming
  # climb.
  mini_bar_count: 30

  # Names and accent colors for the climb banner's category chip, chosen by the
  # climb's average grade: the first entry whose `max_average_grade_percent` the
  # climb does not exceed wins, and the last (.inf) is the catch-all for
  # anything steeper. Colors track the shared grade palette (gentle → green,
  # brutal → red; see grade_palette.colors above). This is only a plain-language
  # label derived from average grade — no HC/Cat-1-style road categorization is
  # attempted, matching how difficulty.mjs classifies from geometry alone.
  categories:
    - { max_average_grade_percent: 4, name: "GENTLE", color: "#57b877" }
    - { max_average_grade_percent: 7, name: "MODERATE", color: "#e8b74e" }
    - { max_average_grade_percent: 10, name: "STEEP", color: "#e8823c" }
    - { max_average_grade_percent: .inf, name: "BRUTAL", color: "#d9542f" }

# --- Route difficulty classification -----------------------------------------
#
# Classifies a loaded route from distance and total elevation gain alone —
# no power, speed, weight, weather, surface, or ride-effort data. See
# app/route/difficulty.mjs. Every threshold below is the inclusive lower
# bound of its class, in ascending order; edit freely to retune the scale.
# The gallery generator reads the same tables, so cards and the app always
# agree.
route_difficulty:
  # One "equivalent kilometer" is this many meters of elevation gain, added to
  # the raw distance as a simple overall-effort estimate. Lower = climbing
  # counts for more; higher = climbing counts for less.
  equivalent_km_climb_meters: 100

  # Distance class, by route distance in km.
  distance_class_thresholds_km:
    - { min: 0, label: "XS" }
    - { min: 20, label: "S" }
    - { min: 40, label: "M" }
    - { min: 70, label: "L" }
    - { min: 110, label: "XL" }
    - { min: 160, label: "XXL" }

  # Terrain class, by meters of elevation gain per km of distance.
  terrain_class_thresholds_m_per_km:
    - { min: 0, label: "Flat" }
    - { min: 5, label: "Gentle" }
    - { min: 10, label: "Rolling" }
    - { min: 20, label: "Hilly" }
    - { min: 35, label: "Mountainous" }

  # Overall difficulty, by equivalent km (distance + elevation gain converted
  # via equivalent_km_climb_meters).
  difficulty_thresholds_equivalent_km:
    - { min: 0, label: "Very Easy" }
    - { min: 25, label: "Easy" }
    - { min: 50, label: "Moderate" }
    - { min: 85, label: "Hard" }
    - { min: 130, label: "Very Hard" }
    - { min: 190, label: "Epic" }

# --- Climb detection ---------------------------------------------------------
#
# Climb detection models a running "fatigue" (pressure integrator) score
# meant to emulate human perceived effort, rather than purely reading
# point-to-point geometry:
#
# - The raw route is first resampled to a fixed step (independent of the
#   source GPX's point density), then double-filtered (median, then moving
#   average) to remove GPS spikes and jitter.
# - At each point, both a short- and a long-distance rolling grade are
#   computed; whichever reads more "climb-like" (a nonlinear function of
#   grade, so a human's non-linear perception of steepness is modeled) fills
#   the fatigue bucket, so punchy ramps and long sustained drags both
#   register.
# - Flats and gentle grades drain the bucket, faster the steeper the descent.
# - A segment is officially recognized as an active climb once the bucket
#   crosses a start threshold; it closes once the bucket has drained back
#   down, or once the route has descended enough past the peak, or once
#   there has been a long enough flat/downhill spell since the peak.
# - Nearby accepted climbs separated only by a small dip are merged into one.
#
# This model prevents a long climb from being fractured into multiple pieces
# by brief dips or false flats, while correctly ignoring small, insignificant
# rollers and long near-flat drags.
climb_detection:
  # Distance (in meters) the raw route is resampled to before analysis. This
  # makes climb detection independent of the source GPX's point density.
  resample_step_meters: 20.0

  # Median filter window (in meters) applied to resampled elevation first;
  # removes single-point spikes without smearing real terrain shape.
  elevation_median_window_meters: 60.0

  # Moving-average window (in meters) applied after the median filter;
  # removes remaining GPS jitter.
  elevation_smooth_window_meters: 120.0

  # Rolling-grade window (in meters) used to catch short, punchy ramps.
  short_grade_window_meters: 120.0

  # Rolling-grade window (in meters) used to catch long, sustained drags.
  long_grade_window_meters: 320.0

  # The long-window grade's pressure is scaled by this factor relative to the
  # short window's, so a long drag needs to be a little more convincing than
  # a short ramp before it wins out.
  long_grade_weight: 0.85

  # Fatigue bucket must reach this level for a candidate to become an
  # officially active climb. Lowering this makes the algorithm more sensitive
  # to shorter, punchier hills.
  start_fatigue: 300.0

  # Fatigue bucket level, once an active climb drops to or below this (and
  # has been at least end_fatigue_min_distance_meters past its peak), that
  # counts as recovery and closes the climb.
  end_fatigue: 85.0
  end_fatigue_min_distance_meters: 80.0

  # Absolute ceiling on the fatigue bucket, so a massive alpine climb never
  # accumulates unbounded fatigue — without this lid, a long mountain descent
  # would not be enough to drain the bucket and close the climb.
  max_fatigue: 1200.0

  # Grade (in percent) below which climb pressure does not fill the bucket at
  # all. This is the main false-flat killer.
  pressure_start_grade_percent: 1.8

  # Exponent applied to (grade − pressure_start_grade_percent) to turn grade
  # into fatigue pressure. Above 1, pressure ramps up faster than grade does
  # — matching how humans perceive steepness non-linearly (a jump from 2% to
  # 4% barely registers, 8%+ hurts a lot more than twice as much).
  pressure_exponent: 1.35

  # Recovery curve: how fast the fatigue bucket drains, based on the steeper
  # of the short/long rolling grade (so the bucket only drains once both
  # windows agree the road isn't climbing).
  # Grade at/above this (percent) is treated as still climbing: no recovery.
  recovery_uphill_threshold_percent: 1.2
  # Grade at/above this but below the uphill threshold: flat, slow recovery.
  recovery_flat_threshold_percent: -0.5
  recovery_flat_pressure: 0.25
  # Below the flat threshold (descending): recovery scales with how steep the
  # descent is, `recovery_downhill_base + |grade| * recovery_downhill_scale`,
  # capped at recovery_max.
  recovery_downhill_base: 0.50
  recovery_downhill_scale: 0.28
  recovery_max: 3.0

  # Sanity check: minimum accumulated elevation gain (in meters) from the
  # true base to the true peak. Using accumulated gain ensures that rocky,
  # rolling trails that net little elevation but require significant upward
  # pedaling are still recognized.
  min_gain_meters: 15.0

  # Sanity check: minimum length (in meters) for a candidate to be accepted
  # as a climb.
  min_distance_meters: 500.0

  # When fatigue crosses the start threshold, how far back (in meters) the
  # search for the climb's true base is allowed to look. Prevents a very old
  # shallow drag from diluting the climb's start forever.
  start_lookback_meters: 1000.0

  # A climb ends once elevation has dropped this many meters below the
  # peak...
  end_drop_meters: 12.0

  # ...and the route has moved this many meters past the peak while dropping.
  end_drop_distance_meters: 160.0

  # A climb also ends after this many meters with no climb pressure at all
  # since the peak, even without a meaningful elevation drop.
  max_easy_after_peak_meters: 500.0

  # Two detected climbs closer together than this (in meters) are merged into
  # one human-perceived climb...
  merge_gap_meters: 250.0

  # ...as long as the elevation drop between them is no more than this (in
  # meters) — a bigger drop means a real intervening descent, not noise.
  merge_max_drop_meters: 8.0

  # Sanity check: minimum average grade (in percent) a candidate must clear
  # to be accepted, looked up by its length — short hills need to be steeper
  # to feel like real climbs; long climbs can be gentler and still feel real.
  # The first row whose max_length_meters the candidate's length is under
  # wins; the last (.inf) row is the catch-all for very long climbs.
  min_average_grade_for_length:
    - max_length_meters: 350
      min_average_grade_percent: 4.0
    - max_length_meters: 700
      min_average_grade_percent: 3.0
    - max_length_meters: 1500
      min_average_grade_percent: 2.0
    - max_length_meters: .inf
      min_average_grade_percent: 1.4

# --- Demo mode ---------------------------------------------------------------
#
# Synthetic trainer + heart-rate strap profile used for screen recordings.
# It is deliberately separate from user settings: enabling Demo mode never
# overwrites the rider's stored HR/FTP values or connects to BLE devices.
demo_ride:
  # Fixed showcase rider values. ftp_watts and max_heart_rate_bpm drive the
  # training meters; the weights drive the grade-to-speed physics model.
  rider_weight_kg: 100
  bike_weight_kg: 9
  ftp_watts: 270
  max_heart_rate_bpm: 180
  resting_heart_rate_bpm: 86
  threshold_heart_rate_bpm: 155
  # Upper bound for generated demo history. When starting Demo mode from the
  # middle or end of a route, the synthetic past is thinned to this many
  # samples so the whole route is painted without making profile redraws heavy.
  max_history_samples: 3600

  # Target power model: flats sit below threshold, climbs add work, descents
  # back off. Smoothing keeps power from jumping at every GPX grade wiggle.
  flat_power_watts: 205
  climb_watts_per_grade_percent: 13.5
  descent_watts_per_grade_percent: 24
  min_power_watts: 85
  max_power_watts: 360
  power_smoothing_tau_seconds: 7

  # Cycling physics inputs for solving speed from power and road grade.
  # drag_area is intentionally upright/hoods-ish so the demo feels like a
  # rider, not a velodrome time trial.
  rolling_resistance_coefficient: 0.005
  drag_area_square_meters: 0.48
  air_density_kg_per_cubic_meter: 1.225
  drivetrain_efficiency: 0.96
  min_speed_kph: 5
  max_speed_kph: 72
  speed_smoothing_tau_seconds: 5

  # HR follows effort slowly. It rises after sustained power, waits before
  # dropping, and after two low-effort minutes eases back toward resting HR.
  heart_rate_update_interval_seconds: 1
  heart_rate_rise_tau_seconds: 30
  heart_rate_fall_delay_seconds: 16
  heart_rate_fall_tau_seconds: 78
  low_effort_return_delay_seconds: 120
  heart_rate_noise_bpm: 1

# --- Ride recording ----------------------------------------------------------
#
# While moving, a track sample is appended roughly every sample_interval and
# the whole log is persisted to browser storage every persist_interval so a
# reload or crash never loses a ride. Denser samples = bigger FIT files and
# more storage churn.
ride_recording:
  sample_interval_ms: 1000
  persist_interval_ms: 5000

# --- Landing page hero replay ------------------------------------------------
#
# The public landing page (app/index.html, driven by app/landing/landing.mjs)
# plays a looping cinematic replay of one route over the same Google
# Photorealistic 3D map the app uses, with a faked HUD, then a summit orbit,
# then fades and loops. These are that replay's only knobs — the landing has
# no settings UI, so unlike the rest of this file they are not user-facing
# defaults, just the one place to retune the hero without touching
# landing.mjs. All are read through LANDING_HERO in landing.mjs.
landing_hero:
  # Background-app treatment behind the headline: how much the map+HUD are
  # dimmed (0–0.75, higher = darker) and blurred (px), plus the strength of
  # the top/bottom scrim gradient that keeps the headline legible (0–0.9).
  app_dim: 0.18
  app_blur_px: 0.6
  headline_scrim: 0.66

  # Faked rider physiology used to animate the HUD numbers during the ride
  # phase: baseline flat speed the sim rides at (grade slows it), and how
  # many seconds heart rate lags a change in effort.
  avg_speed_kmh: 16
  hr_lag_seconds: 8

  # Ride-phase pacing: the replay starts the rider partway up the route so
  # the load→summit stretch shown takes finale_seconds at finale_speed_kmh.
  finale_speed_kmh: 16
  finale_seconds: 40

  # Chase camera during the ride: distance behind (m), tilt toward the
  # horizon (deg), how far ahead of the rider the camera aims into a turn
  # (m), and the pan rate/acceleration limits that keep heading changes
  # smooth (deg/s, deg/s²).
  chase_range_meters: 440
  chase_tilt_degrees: 75
  cam_lookahead_meters: 0
  cam_turn_rate_deg_per_sec: 40
  cam_turn_accel_deg_per_sec2: 20

  # Summit orbit after finishing: orbit distance (m), tilt (deg), seconds per
  # full revolution, and how long the orbit runs before the fade-out and loop.
  orbit_range_meters: 1000
  orbit_tilt_degrees: 75
  orbit_seconds_per_rev: 70
  orbit_seconds: 22

  # Assets the hero pulls in, relative to app/. The rider marker mesh is the
  # same model the app rides on; set fallback_image_path to a still image when
  # the 3D map should have an image fallback for no-key/unsupported cases.
  rider_model_path: "assets/rider-dot.glb"
  fallback_image_path: ""

  # Detected climbs on the replayed route, as [start_meters, end_meters] spans
  # (end clamped to route length). Matches the Ještěd route's three steps so
  # the faked climb banner reads true; retune alongside LANDING_ROUTE_POINTS.
  climb_spans_meters:
    - [2300, 3900]
    - [4300, 9300]
    - [10400, .inf]
