# GPX Rider tuning — every adjustable app parameter in one documented place,
# shared by the browser app AND the Python generators (no more mirroring
# values by hand in scripts/).
#
# Change a value here, reload the page, done: there is no build step. Each
# key says what it does, what unit it is in, and what happens when you move
# it. Settings the user can change in the ⚙ dialog only get their *defaults*
# from here — a value already saved in the browser (see app/storage/
# storage.mjs) wins until the user resets it (or clears site data).
#
# Layout: values are grouped into snake_case sections, at most two levels
# deep (section → group → key). app/core/tuning.mjs maps each nested path
# back to the historical UPPER_SNAKE constant name the rest of the app still
# imports, and scripts/tuning_config.py walks the same tree — so the two
# languages read the exact same file. Move or rename a key here and you only
# touch those two mappers, not every call site.
#
# Read by app/core/tuning.mjs (browser + tests) and scripts/tuning_config.py
# (generators). Both implement the same deliberately small YAML subset:
#   - "#" comments (full-line or after whitespace)
#   - block maps nested by 2-space indentation
#   - block sequences ("- item"), items may be scalars, flow collections, or
#     small maps
#   - flow sequences [a, b] and flow maps { k: v }
#   - scalars: quoted/bare strings, numbers, true/false/null, .inf
# Keep colors and anything containing ":" or "#" in double quotes. Anchors,
# multi-line block scalars and other full-YAML features are NOT supported.
#
# Two things deliberately do NOT live here:
#   - app/config.mjs — the deploy-time Maps API key slot. It is rewritten by
#     scripts/inject_maps_api_key.py during deployment, so it must stay as-is.
#   - BLE write-queue internals in trainer/trainer.mjs — timing of GATT
#     operations is a hardware-safety concern, tuned against real trainers;
#     read the comments there before touching them.

app:
  # The product name shown in the UI and written into exported files.
  name: "GPX Rider"

# --- Movement & pedaling -----------------------------------------------------
movement:
  # Pedaling detection with hysteresis: the rider counts as "pedaling" once the
  # trainer reports at least start_kph, and stops counting only after speed
  # falls to stop_kph. The gap keeps a spinning-down flywheel from flapping
  # the movement source on/off around a single threshold.
  pedaling:
    start_kph: 3
    stop_kph: 1

  # Simulation speed slider: the artificial speed used to auto-ride a route
  # with no trainer. default_kph is where the slider starts; min/max bound both
  # the slider and any saved value. These drive the range input's attributes
  # at startup, so this is the single source of truth for the slider's range.
  simulation_speed:
    min_kph: 8
    max_kph: 100
    default_kph: 24

  # A backgrounded tab stops requestAnimationFrame; without this cap the first
  # frame after returning would teleport the rider minutes down the road.
  # Raising it makes background riding smoother-looking on return but risks a
  # visible jump after long pauses.
  max_tick_seconds: 5

  # How often the slow parts of the ride UI (DOM stats, elevation profile,
  # minimap marker) refresh while moving. The map camera still updates every
  # frame; this only throttles text/canvas work.
  slow_ui_interval_ms: 250

  # How often the ride (route + progress) is persisted to browser storage
  # while moving. Lower = less progress lost on a crash, more storage churn.
  ride_save_throttle_ms: 1500

# --- Trainer grade updates ---------------------------------------------------
trainer:
  # How often the averaged route grade is written to the trainer, in seconds.
  # default_seconds is what the settings slider starts at; min/max bound both
  # the slider and any saved value. Faster updates track terrain more closely
  # but make the trainer hunt on noisy GPX elevation.
  grade_interval:
    default_seconds: 2
    min_seconds: 1
    max_seconds: 5
  # Rolling-resistance coefficient sent with every Track Resistance (grade)
  # command to a Tacx FE-C trainer (the wheel-on Flow/Vortex/Bushido/Genius,
  # which speak ANT+ FE-C over BLE instead of FTMS). 0.004 is a typical
  # asphalt value; raise it for a heavier simulated surface. Ignored by FTMS
  # trainers, whose Set Simulation Parameters carries its own rolling term.
  fec_default_crr: 0.004

# --- Route math (grade, ascent/descent) --------------------------------------
route_math:
  # The live grade is measured over a window this many meters behind and ahead
  # of the rider. Longer = smoother grade that lags hill starts; shorter =
  # snappier but noisier with imperfect GPX elevation.
  grade_lookaround_meters: 18

  grade:
    # The grade sent to the trainer and shown in the stats is clamped to this
    # range (in percent) so one bad elevation point can't slam the trainer.
    min_percent: -15
    max_percent: 20
    # The HUD grade meter caps its visual scale more tightly than the clamp
    # above. Values beyond these endpoints pin to the edge, keeping the outer
    # green/red bands comparable in width to the middle bands.
    meter_min_percent: -6
    meter_max_percent: 10

  # Total ascent/descent noise filter: an elevation change only counts toward
  # the cumulative ascent/descent once it exceeds this many meters in one
  # direction. GPX elevation jitters by a meter or so point-to-point; summing
  # it raw would badly overestimate climbing. Bigger values under-count short
  # rollers, smaller values over-count noise. 2 m matches what most route
  # planners report. (Also used by the gallery generator so cards report the
  # same totals the app shows once the route is loaded.)
  climb_noise_threshold_meters: 2

# --- Grade color palette -----------------------------------------------------
#
# Stepped grade palette shared by the elevation profile, the map route
# coloring, the HUD meters, the climb banner mini-profile, AND the gallery
# generator's mini profile bars (scripts/generate_gallery_json.py) — one
# palette, read from here by both languages. The panel legend swatches in
# styles.css are the one remaining hand-synced copy (CSS cannot read this
# file). Buckets read: green for descents, gray for flat, amber -> orange ->
# red as the climb steepens.
grade_palette:
  # Bucket boundary grades, in percent: descent | easy descent | flat | gentle
  # | moderate | steep. A grade at or below the first threshold gets the first
  # color, and so on; anything past the last threshold gets the last color.
  thresholds: [-3, -0.6, 0.8, 3.5, 7]

  # One color per bucket (thresholds above define the 5 boundaries between
  # these 6 colors).
  colors:
    - "#3fae6a"
    - "#57b877"
    - "rgba(125, 138, 134, 0.55)"
    - "#e8b74e"
    - "#e8823c"
    - "#d9542f"

# --- Smart ETA ---------------------------------------------------------------
#
# The ETA converts the route into "flat-equivalent meters": every meter of
# climbing still ahead counts as extra flat distance, every meter of descent
# gives a little back. Your pace in flat-equivalent meters per second is
# measured over the ride so far, then applied to what's left — so a slow
# pass over the top of a climb doesn't project a slow descent.
eta:
  # How many flat meters one vertical meter of climbing costs. ~25 matches a
  # recreational rider around 150 W (1 km at 8% ≈ 1 km + 80 m × 25 = 3 km
  # flat-equivalent). Strong riders effectively "pay" less — lower it if the
  # ETA overshoots on climbs for you.
  climb_equivalent_factor: 25

  # How many flat meters one vertical meter of descent gives back. Descending
  # is faster than flat riding but not free (braking, corners). Must stay well
  # below 1/max-descent-grade (~6.7 at the -15% clamp) or a steep descent
  # could count as negative distance.
  descent_credit_factor: 5

  # The measured pace is trusted only after this much riding; before that the
  # ETA falls back to the current speed (rough, but better than nothing).
  min_history_seconds: 45
  min_history_meters: 150

# --- Map (Leaflet + OpenStreetMap top-down view) ------------------------------
#
# GPX Rider renders a plain top-down 2D slippy map (Leaflet, loaded via CDN
# script tags in app.html/index.html — no npm install, no build step) with
# OpenStreetMap raster tiles. No API key is required: OSM tiles are free and
# anonymous. There is no 3D camera, tilt, or perspective — panning and zooming
# is exactly what Leaflet gives you for free.
map:
  # Standard OpenStreetMap tile server. "{s}" is a load-balanced subdomain,
  # "{z}/{x}/{y}" the standard slippy-map tile coordinate.
  tile_url: "https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png"
  tile_subdomains: ["a", "b", "c"]
  # Required by the OpenStreetMap tile usage policy — never remove or hide it.
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
  max_zoom: 19

  # Shown before any route is loaded (roughly the Alps, matching the old
  # default 3D camera's starting point).
  default_center_lat: 46.8182
  default_center_lng: 8.2275
  default_zoom: 6

  # Zoom level the follow camera settles at behind the rider while riding.
  follow_zoom: 16

  # Padding (screen pixels) kept clear around the route when fitting the whole
  # route (or a focused climb/segment) into view.
  overview_padding_pixels: 40

  # The rider's heading is sampled this many meters behind/ahead of the rider,
  # so the marker points the way the rider moves rather than at a noisy single
  # GPX segment.
  heading_sample_meters: 4

  # After the user stops dragging/zooming the map, the app waits this long
  # before resuming automatic follow/overview control.
  interaction_settle_ms: 600

  # The rider marker: a small circular dot with a directional arrow that
  # rotates to the current heading, echoing the brand "GPX Rider" logo dot
  # (solid amber center, paler amber ring).
  marker_size_pixels: 22
  marker_color: "#f6a52c"
  marker_ring_color: "rgba(246, 165, 44, 0.35)"

# --- Profile segment selection -----------------------------------------------
profile_segment_selection:
  # Horizontal pointer movement before a profile interaction becomes a segment
  # selection instead of a normal click-to-seek.
  drag_pixels: 8

  # The smallest elevation-profile drag interval accepted as a selected segment.
  # Very short routes scale this down by min_route_fraction.
  min_meters: 50
  min_route_fraction: 0.01

# --- Route line rendering ----------------------------------------------------
route_line:
  # Color the map route by the same grade buckets as the elevation profile.
  # Turning this off restores the single blue route trace.
  grade_colors_enabled: true

  color: "#0a84ff"
  width: 5

  # Selected climbs/segments replace their normal route segments with this
  # wider treatment.
  focus_width: 8

# --- Gallery previews & mini profiles ----------------------------------------
gallery:
  preview:
    # Gallery cards show a lightweight top-down Leaflet preview map, auto-
    # framed to the route's bounds. fit_padding keeps the route clear of the
    # thumbnail edges.
    fit_padding_pixels: 20
    route_color: "#0a84ff"
    route_width: 3

  # Gallery card mini elevation profile (baked into app/gallery.json by
  # scripts/generate_gallery_json.py — rerun `make gallery-data` after changing
  # these): how many bars each card's strip has, and the lighter flat-bucket
  # tone used on cards (the standard palette's flat gray reads too dark on the
  # card background; all other buckets use grade_palette.colors).
  mini_profile:
    bar_count: 44
    flat_color: "rgba(200, 206, 214, 0.55)"

# --- Screenshots -------------------------------------------------------------
screenshots:
  # Ride screenshots come out at a constant size so gallery shots line up.
  # The button is opt-in — most riders never need it on the map.
  show_button: false
  aspect: "16:9"
  default_width: 1920
  width_min: 640
  width_max: 3840

# --- Recording (theater mode) ------------------------------------------------
recording:
  # One-click recording preset: a CSS-pinned "theater mode" that fixes the map
  # viewport to exactly this size (dimming the rest of the app behind it) so
  # screen captures come out at a consistent size. Not exported JPG dimensions,
  # and not an actual browser-window resize — most browsers block scripted
  # resizing of a window/tab they didn't open themselves via window.open().
  # The UI labels/messages naming this size are derived from these values.
  map_viewport:
    width_pixels: 1200
    height_pixels: 630
    tolerance_pixels: 1

  # Optional checkboxes (Demo mode panel) that hide specific HUD overlays while
  # theater mode is active, so a screen recording can be a clean, showcase-ready
  # shot of just the map, route and rider — no data tiles, banners or buttons.
  theater_hide:
    clock: false
    meters: false
    dock: false
    climb_banner: false
    demo_chip: false
    controls: false

# --- Display & HUD defaults --------------------------------------------------
display_hud:
  # Local clock format used by the fullscreen top-left stats chip. The user's
  # choice is persisted with the other display settings.
  time_format: "24"

  # Duration readouts default to explicit hour/minute labels (1h30m) so ETAs
  # cannot be mistaken for minute/second clocks. "clock" keeps the old 1:30:00
  # style for users who prefer stopwatch formatting.
  duration_format: "compact"

  # Wall-clock refresh cadence while the fullscreen HUD is visible.
  fullscreen_clock_refresh_ms: 1000

  # Heart-rate UI refresh cadence while a dedicated strap is connected. Strap
  # notifications remain the data source; this loop republishes the current
  # strap truth to every display even while the ride/map UI is otherwise idle.
  heart_rate_refresh_ms: 1000

  # Ordered fullscreen bottom-dock data fields. Keys must match the
  # data-hud="…" attributes in app.html. visible_count controls how many
  # fields are shown from the front of the order; users can still put every
  # field on-screen if they want a denser dock.
  field_order:
    - speed
    - ascentLeft
    - calories
    - remaining
    - power
    - heartRate
    - grade
    - ridden
    - eta
    - altitude
    - ascent
    - elapsed
  visible_count: 4

  # The fullscreen ride HUD's bottom data dock can be collapsed to a compact
  # strip (key metrics + the two progress bars) or expanded to the full dock
  # (metric tiles + the road-ahead elevation profile). This is its initial
  # state; the user's choice is persisted with the other display settings.
  dock_collapsed: false

# --- Training zones & calories -----------------------------------------------
training_zones:
  # Training zones for the fullscreen left-side meters. Heart rate uses
  # Heart Rate Reserve (Karvonen) from resting/max HR; power uses FTP.
  resting_heart_rate_bpm: 60
  max_heart_rate_bpm: 180
  power_zone_definitions:
    - { name: "Active Recovery", color: "#8b949e" }
    - { name: "Endurance", color: "#4f9bff" }
    - { name: "Tempo", color: "#57b877" }
    - { name: "Threshold", color: "#e8b74e" }
    - { name: "VO2 Max", color: "#e8823c" }
    - { name: "Anaerobic", color: "#d96a3f" }
    - { name: "Neuromuscular", color: "#d9542f" }
  heart_rate_zone_definitions:
    - { name: "Recovery", color: "#8b949e" }
    - { name: "Endurance", color: "#4f9bff" }
    - { name: "Tempo", color: "#57b877" }
    - { name: "Threshold", color: "#e8823c" }
    - { name: "Max", color: "#d9542f" }
  heart_rate_max_age_formula_base: 220
  profile_history_sample_limit: 1800

  # Cadence meter (fullscreen left-side HUD): a fixed rpm scale with green in
  # the target pedaling range and yellow/red bands outside it — unlike
  # power/HR this isn't derived from a rider profile, so the bounds are plain
  # constants rather than a formula.
  cadence_meter_min_rpm: 40
  cadence_meter_max_rpm: 140
  cadence_zone_green_min_rpm: 90
  cadence_zone_green_max_rpm: 110
  cadence_zone_yellow_min_rpm: 75
  cadence_zone_yellow_max_rpm: 125
  cadence_zone_colors: { red: "#d9542f", yellow: "#e8b74e", green: "#57b877" }

  # Gross metabolic efficiency for converting measured cycling work into active
  # human calories. Power meters report mechanical work at the pedals; humans
  # spend more chemical energy than that to produce it. 0.24 means 24% of the
  # rider's active energy becomes measured mechanical work.
  cycling_gross_efficiency: 0.24

# --- Fullscreen climb banner -------------------------------------------------
climb_banner:
  # Top-center of the ride HUD. It appears while the rider is on a detected
  # climb, or while approaching the next one within this distance; it is hidden
  # otherwise.
  approach_meters: 1000

  # Bars drawn in the climb banner's mini elevation profile of the upcoming
  # climb.
  mini_bar_count: 30

  # Names and accent colors for the climb banner's category chip, chosen by the
  # climb's average grade: the first entry whose `max_average_grade_percent` the
  # climb does not exceed wins, and the last (.inf) is the catch-all for
  # anything steeper. Colors track the shared grade palette (gentle → green,
  # brutal → red; see grade_palette.colors above). This is only a plain-language
  # label derived from average grade — no HC/Cat-1-style road categorization is
  # attempted, matching how difficulty.mjs classifies from geometry alone.
  categories:
    - { max_average_grade_percent: 4, name: "GENTLE", color: "#57b877" }
    - { max_average_grade_percent: 7, name: "MODERATE", color: "#e8b74e" }
    - { max_average_grade_percent: 10, name: "STEEP", color: "#e8823c" }
    - { max_average_grade_percent: .inf, name: "BRUTAL", color: "#d9542f" }

# --- Route difficulty classification -----------------------------------------
#
# Classifies a loaded route from distance and total elevation gain alone —
# no power, speed, weight, weather, surface, or ride-effort data. See
# app/route/difficulty.mjs. Every threshold below is the inclusive lower
# bound of its class, in ascending order; edit freely to retune the scale.
# The gallery generator reads the same tables, so cards and the app always
# agree.
route_difficulty:
  # One "equivalent kilometer" is this many meters of elevation gain, added to
  # the raw distance as a simple overall-effort estimate. Lower = climbing
  # counts for more; higher = climbing counts for less.
  equivalent_km_climb_meters: 100

  # Distance class, by route distance in km.
  distance_class_thresholds_km:
    - { min: 0, label: "XS" }
    - { min: 20, label: "S" }
    - { min: 40, label: "M" }
    - { min: 70, label: "L" }
    - { min: 110, label: "XL" }
    - { min: 160, label: "XXL" }

  # Terrain class, by meters of elevation gain per km of distance.
  terrain_class_thresholds_m_per_km:
    - { min: 0, label: "Flat" }
    - { min: 5, label: "Gentle" }
    - { min: 10, label: "Rolling" }
    - { min: 20, label: "Hilly" }
    - { min: 35, label: "Mountainous" }

  # Overall difficulty, by equivalent km (distance + elevation gain converted
  # via equivalent_km_climb_meters).
  difficulty_thresholds_equivalent_km:
    - { min: 0, label: "Very Easy" }
    - { min: 25, label: "Easy" }
    - { min: 50, label: "Moderate" }
    - { min: 85, label: "Hard" }
    - { min: 130, label: "Very Hard" }
    - { min: 190, label: "Epic" }

# --- Climb detection ---------------------------------------------------------
#
# Climb detection models a running "fatigue" (pressure integrator) score
# meant to emulate human perceived effort, rather than purely reading
# point-to-point geometry:
#
# - The raw route is first resampled to a fixed step (independent of the
#   source GPX's point density), then double-filtered (median, then moving
#   average) to remove GPS spikes and jitter.
# - At each point, both a short- and a long-distance rolling grade are
#   computed; whichever reads more "climb-like" (a nonlinear function of
#   grade, so a human's non-linear perception of steepness is modeled) fills
#   the fatigue bucket, so punchy ramps and long sustained drags both
#   register.
# - Flats and gentle grades drain the bucket, faster the steeper the descent.
# - A segment is officially recognized as an active climb once the bucket
#   crosses a start threshold; it closes once the bucket has drained back
#   down, or once the route has descended enough past the peak, or once
#   there has been a long enough flat/downhill spell since the peak.
# - Nearby accepted climbs separated only by a small dip are merged into one.
#
# This model prevents a long climb from being fractured into multiple pieces
# by brief dips or false flats, while correctly ignoring small, insignificant
# rollers and long near-flat drags.
climb_detection:
  # Distance (in meters) the raw route is resampled to before analysis. This
  # makes climb detection independent of the source GPX's point density.
  resample_step_meters: 20.0

  # Median filter window (in meters) applied to resampled elevation first;
  # removes single-point spikes without smearing real terrain shape.
  elevation_median_window_meters: 60.0

  # Moving-average window (in meters) applied after the median filter;
  # removes remaining GPS jitter.
  elevation_smooth_window_meters: 120.0

  # Rolling-grade window (in meters) used to catch short, punchy ramps.
  short_grade_window_meters: 120.0

  # Rolling-grade window (in meters) used to catch long, sustained drags.
  long_grade_window_meters: 320.0

  # The long-window grade's pressure is scaled by this factor relative to the
  # short window's, so a long drag needs to be a little more convincing than
  # a short ramp before it wins out.
  long_grade_weight: 0.85

  # Fatigue bucket must reach this level for a candidate to become an
  # officially active climb. Lowering this makes the algorithm more sensitive
  # to shorter, punchier hills.
  start_fatigue: 300.0

  # Fatigue bucket level, once an active climb drops to or below this (and
  # has been at least end_fatigue_min_distance_meters past its peak), that
  # counts as recovery and closes the climb.
  end_fatigue: 85.0
  end_fatigue_min_distance_meters: 80.0

  # Absolute ceiling on the fatigue bucket, so a massive alpine climb never
  # accumulates unbounded fatigue — without this lid, a long mountain descent
  # would not be enough to drain the bucket and close the climb.
  max_fatigue: 1200.0

  # Grade (in percent) below which climb pressure does not fill the bucket at
  # all. This is the main false-flat killer.
  pressure_start_grade_percent: 1.8

  # Exponent applied to (grade − pressure_start_grade_percent) to turn grade
  # into fatigue pressure. Above 1, pressure ramps up faster than grade does
  # — matching how humans perceive steepness non-linearly (a jump from 2% to
  # 4% barely registers, 8%+ hurts a lot more than twice as much).
  pressure_exponent: 1.35

  # Recovery curve: how fast the fatigue bucket drains, based on the steeper
  # of the short/long rolling grade (so the bucket only drains once both
  # windows agree the road isn't climbing).
  # Grade at/above this (percent) is treated as still climbing: no recovery.
  recovery_uphill_threshold_percent: 1.2
  # Grade at/above this but below the uphill threshold: flat, slow recovery.
  recovery_flat_threshold_percent: -0.5
  recovery_flat_pressure: 0.25
  # Below the flat threshold (descending): recovery scales with how steep the
  # descent is, `recovery_downhill_base + |grade| * recovery_downhill_scale`,
  # capped at recovery_max.
  recovery_downhill_base: 0.50
  recovery_downhill_scale: 0.28
  recovery_max: 3.0

  # Sanity check: minimum accumulated elevation gain (in meters) from the
  # true base to the true peak. Using accumulated gain ensures that rocky,
  # rolling trails that net little elevation but require significant upward
  # pedaling are still recognized.
  min_gain_meters: 15.0

  # Sanity check: minimum length (in meters) for a candidate to be accepted
  # as a climb.
  min_distance_meters: 500.0

  # When fatigue crosses the start threshold, how far back (in meters) the
  # search for the climb's true base is allowed to look. Prevents a very old
  # shallow drag from diluting the climb's start forever.
  start_lookback_meters: 1000.0

  # A climb ends once elevation has dropped this many meters below the
  # peak...
  end_drop_meters: 12.0

  # ...and the route has moved this many meters past the peak while dropping.
  end_drop_distance_meters: 160.0

  # A climb also ends after this many meters with no climb pressure at all
  # since the peak, even without a meaningful elevation drop.
  max_easy_after_peak_meters: 500.0

  # Two detected climbs closer together than this (in meters) are merged into
  # one human-perceived climb...
  merge_gap_meters: 250.0

  # ...as long as the elevation drop between them is no more than this (in
  # meters) — a bigger drop means a real intervening descent, not noise.
  merge_max_drop_meters: 8.0

  # Sanity check: minimum average grade (in percent) a candidate must clear
  # to be accepted, looked up by its length — short hills need to be steeper
  # to feel like real climbs; long climbs can be gentler and still feel real.
  # The first row whose max_length_meters the candidate's length is under
  # wins; the last (.inf) row is the catch-all for very long climbs.
  min_average_grade_for_length:
    - max_length_meters: 350
      min_average_grade_percent: 4.0
    - max_length_meters: 700
      min_average_grade_percent: 3.0
    - max_length_meters: 1500
      min_average_grade_percent: 2.0
    - max_length_meters: .inf
      min_average_grade_percent: 1.4

# --- Demo mode ---------------------------------------------------------------
#
# Synthetic trainer + heart-rate strap profile used for screen recordings.
# It is deliberately separate from user settings: enabling Demo mode never
# overwrites the rider's stored HR/FTP values or connects to BLE devices.
demo_ride:
  # Fixed showcase rider values. ftp_watts and max_heart_rate_bpm drive the
  # training meters; the weights drive the grade-to-speed physics model.
  rider_weight_kg: 100
  bike_weight_kg: 9
  ftp_watts: 270
  max_heart_rate_bpm: 180
  resting_heart_rate_bpm: 86
  threshold_heart_rate_bpm: 155
  # Upper bound for generated demo history. When starting Demo mode from the
  # middle or end of a route, the synthetic past is thinned to this many
  # samples so the whole route is painted without making profile redraws heavy.
  max_history_samples: 3600

  # Target power model: flats sit below threshold, climbs add work, descents
  # back off. Smoothing keeps power from jumping at every GPX grade wiggle.
  flat_power_watts: 205
  climb_watts_per_grade_percent: 13.5
  descent_watts_per_grade_percent: 24
  min_power_watts: 85
  max_power_watts: 360
  power_smoothing_tau_seconds: 7

  # Target cadence model: a real rider grinds a lower cadence climbing and
  # spins a higher one descending — a single negative slope against grade
  # covers both (climbing: positive grade * negative slope = lower cadence;
  # descending: negative grade * negative slope = higher cadence). Smoothed
  # the same way power is, plus a little noise so it doesn't read as a
  # perfectly flat line — exercises the cadence zone meter (green/yellow/red)
  # across a route's grade changes.
  flat_cadence_rpm: 88
  cadence_rpm_per_grade_percent: -1.5
  min_cadence_rpm: 55
  max_cadence_rpm: 105
  cadence_smoothing_tau_seconds: 5
  cadence_noise_rpm: 2

  # Cycling physics inputs for solving speed from power and road grade.
  # drag_area is intentionally upright/hoods-ish so the demo feels like a
  # rider, not a velodrome time trial.
  rolling_resistance_coefficient: 0.005
  drag_area_square_meters: 0.48
  air_density_kg_per_cubic_meter: 1.225
  drivetrain_efficiency: 0.96
  min_speed_kph: 5
  max_speed_kph: 72
  speed_smoothing_tau_seconds: 5

  # HR follows effort slowly. It rises after sustained power, waits before
  # dropping, and after two low-effort minutes eases back toward resting HR.
  heart_rate_update_interval_seconds: 1
  heart_rate_rise_tau_seconds: 30
  heart_rate_fall_delay_seconds: 16
  heart_rate_fall_tau_seconds: 78
  low_effort_return_delay_seconds: 120
  heart_rate_noise_bpm: 1

# --- Ride recording ----------------------------------------------------------
#
# While moving, a track sample is appended roughly every sample_interval and
# the whole log is persisted to browser storage every persist_interval so a
# reload or crash never loses a ride. Denser samples = bigger FIT files and
# more storage churn.
ride_recording:
  sample_interval_ms: 1000
  persist_interval_ms: 5000

# --- Landing page hero replay ------------------------------------------------
#
# The public landing page (app/index.html, driven by app/landing/landing.mjs)
# plays a looping top-down replay of one route over the same Leaflet/OSM map
# the app uses, with a faked HUD, then a whole-route overview hold, then fades
# and loops. These are that replay's only knobs — the landing has no settings
# UI, so unlike the rest of this file they are not user-facing defaults, just
# the one place to retune the hero without touching landing.mjs. All are read
# through LANDING_HERO in landing.mjs.
landing_hero:
  # Background-app treatment behind the headline: how much the map+HUD are
  # dimmed (0–0.75, higher = darker) and blurred (px), plus the strength of
  # the top/bottom scrim gradient that keeps the headline legible (0–0.9).
  app_dim: 0.18
  app_blur_px: 0.6
  headline_scrim: 0.66

  # Faked rider physiology used to animate the HUD numbers during the ride
  # phase: baseline flat speed the sim rides at (grade slows it), and how
  # many seconds heart rate lags a change in effort.
  avg_speed_kmh: 16
  hr_lag_seconds: 8

  # Ride-phase pacing: the replay starts the rider partway up the route so
  # the load→summit stretch shown takes finale_seconds at finale_speed_kmh.
  finale_speed_kmh: 16
  finale_seconds: 40

  # Top-down follow map zoom level while the ride phase plays.
  chase_zoom: 15

  # Whole-route overview after finishing: how long it holds before the
  # fade-out and loop.
  overview_seconds: 22

  # Set fallback_image_path to a still image shown if the map tiles fail to
  # load (e.g. no network) so the page still reads.
  fallback_image_path: ""

  # Detected climbs on the replayed route, as [start_meters, end_meters] spans
  # (end clamped to route length). Matches the Ještěd route's three steps so
  # the faked climb banner reads true; retune alongside LANDING_ROUTE_POINTS.
  climb_spans_meters:
    - [2300, 3900]
    - [4300, 9300]
    - [10400, .inf]
